name: Release (formula bump)

on:
  push:
    tags:
      - "starcat/*"
      - "blackmoon/*"

permissions:
  contents: read

jobs:
  bump-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Derive crate and version from tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"          # e.g. starcat/0.7.1
          crate="${ref%%/*}"                        # starcat
          # Homebrew scans the version straight from the URL's trailing
          # `<crate>/<version>.tar.gz`, so no --version is passed below.
          {
            echo "crate=$crate"
            echo "url=https://github.com/lucidaeon/mediumcoeli/archive/refs/tags/${ref}.tar.gz"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Configure git identity for the tap commit
        run: |
          git config --global user.email "lucidaeon@users.noreply.github.com"
          git config --global user.name "lucidaeon"

      - name: Open formula-bump PR in the tap
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew tap lucidaeon/tap
          brew bump-formula-pr \
            --no-audit \
            --no-browse \
            --no-fork \
            --url="${{ steps.tag.outputs.url }}" \
            "lucidaeon/tap/${{ steps.tag.outputs.crate }}"
