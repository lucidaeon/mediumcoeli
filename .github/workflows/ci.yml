name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - name: Test (data-gated suites skip; STARCAT_JPL_DATA/ASTRO_* unset)
        run: cargo test --release --workspace

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Regenerate oracle_data.rs and assert no drift
        run: |
          python3 scripts/gen_oracle.py scripts/oracle_manifest.tsv \
            > crates/pericynthion/src/jpl/oracle_data.rs
          cargo fmt -p pericynthion
          git diff --exit-code -- crates/pericynthion/src/jpl/oracle_data.rs
